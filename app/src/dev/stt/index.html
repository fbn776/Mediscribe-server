<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Speech to Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(25, 25, 35, 0.8);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --accent-hover: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse at top, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
            padding: 1rem 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 400;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.2),
                0 2px 4px -2px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Status Indicator */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s ease;
        }

        .status-dot.connecting {
            background: var(--warning);
            animation: pulse 1.5s infinite;
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        .status-dot.error {
            background: var(--danger);
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.9);
            }
        }

        /* Mic Button */
        .mic-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem 0;
        }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            box-shadow:
                0 8px 32px var(--accent-glow),
                0 0 0 0 var(--accent-glow);
        }

        .mic-button:hover {
            transform: scale(1.05);
            box-shadow:
                0 12px 40px var(--accent-glow),
                0 0 0 8px rgba(99, 102, 241, 0.1);
        }

        .mic-button:active {
            transform: scale(0.98);
        }

        .mic-button.recording {
            animation: recording-pulse 2s infinite;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow:
                0 8px 32px rgba(239, 68, 68, 0.4),
                0 0 0 0 rgba(239, 68, 68, 0.4);
        }

        @keyframes recording-pulse {

            0%,
            100% {
                box-shadow:
                    0 8px 32px rgba(239, 68, 68, 0.4),
                    0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            50% {
                box-shadow:
                    0 8px 32px rgba(239, 68, 68, 0.6),
                    0 0 0 20px rgba(239, 68, 68, 0);
            }
        }

        .mic-button svg {
            width: 48px;
            height: 48px;
            fill: white;
            transition: all 0.3s ease;
        }

        .mic-button.recording svg.mic-icon {
            display: none;
        }

        .mic-button svg.stop-icon {
            display: none;
        }

        .mic-button.recording svg.stop-icon {
            display: block;
        }

        .mic-hint {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Audio Visualizer */
        .visualizer-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 1rem 0;
        }

        .visualizer-bar {
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent) 0%, #8b5cf6 100%);
            border-radius: 2px;
            transition: height 0.05s ease;
        }

        .visualizer-container.active .visualizer-bar {
            animation: visualizer 0.5s infinite ease-in-out;
        }

        @keyframes visualizer {

            0%,
            100% {
                height: 20px;
            }

            50% {
                height: 40px;
            }
        }

        .visualizer-container.active .visualizer-bar:nth-child(1) {
            animation-delay: 0s;
        }

        .visualizer-container.active .visualizer-bar:nth-child(2) {
            animation-delay: 0.1s;
        }

        .visualizer-container.active .visualizer-bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        .visualizer-container.active .visualizer-bar:nth-child(4) {
            animation-delay: 0.15s;
        }

        .visualizer-container.active .visualizer-bar:nth-child(5) {
            animation-delay: 0.25s;
        }

        .visualizer-container.active .visualizer-bar:nth-child(6) {
            animation-delay: 0.05s;
        }

        .visualizer-container.active .visualizer-bar:nth-child(7) {
            animation-delay: 0.2s;
        }

        .visualizer-container.active .visualizer-bar:nth-child(8) {
            animation-delay: 0.1s;
        }

        /* Transcript Area */
        .transcript-card {
            min-height: 300px;
        }

        .transcript-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .transcript-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .clear-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .transcript-content {
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .transcript-content::-webkit-scrollbar {
            width: 6px;
        }

        .transcript-content::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        .transcript-content::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }

        .transcript-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        .transcript-text .word {
            display: inline;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .placeholder-text {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            padding: 3rem 1rem;
        }

        .current-segment {
            color: var(--accent);
            font-weight: 500;
        }

        .previous-segment {
            color: var(--text-secondary);
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding-top: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .card {
                padding: 1.5rem;
            }

            .mic-button {
                width: 100px;
                height: 100px;
            }

            .mic-button svg {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎙️ Speech to Text</h1>
            <p class="subtitle">Real-time transcription powered by AI</p>
        </header>

        <div class="card">
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Click microphone to start</span>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="mic-container">
                <button class="mic-button" id="micButton" title="Start/Stop Recording">
                    <svg class="mic-icon" viewBox="0 0 24 24">
                        <path
                            d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z" />
                    </svg>
                    <svg class="stop-icon" viewBox="0 0 24 24">
                        <rect x="6" y="6" width="12" height="12" rx="2" />
                    </svg>
                </button>
                <span class="mic-hint" id="micHint">Click to start recording</span>
            </div>

            <div class="visualizer-container" id="visualizer">
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
            </div>
        </div>

        <div class="card transcript-card">
            <div class="transcript-header">
                <span class="transcript-title">📝 Transcript</span>
                <button class="clear-btn" id="clearBtn">Clear</button>
            </div>
            <div class="transcript-content" id="transcriptContent">
                <p class="placeholder-text" id="placeholder">Your transcription will appear here...</p>
                <p class="transcript-text" id="transcriptText"></p>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const micButton = document.getElementById('micButton');
        const micHint = document.getElementById('micHint');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const visualizer = document.getElementById('visualizer');
        const transcriptText = document.getElementById('transcriptText');
        const placeholder = document.getElementById('placeholder');
        const clearBtn = document.getElementById('clearBtn');
        const errorMessage = document.getElementById('errorMessage');

        // State
        let isRecording = false;
        let websocket = null;
        let audioContext = null;
        let mediaStream = null;
        let audioWorklet = null;
        let fullTranscript = '';
        let wsReady = false; // true once server sends "connected" (after init handshake)

        // Update status display
        function updateStatus(status, text) {
            statusDot.className = 'status-dot ' + status;
            statusText.textContent = text;
        }

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
            updateStatus('error', 'Error occurred');
        }

        // Hide error message
        function hideError() {
            errorMessage.classList.remove('visible');
        }

        // Add text to transcript
        function updateTranscript(text) {
            placeholder.style.display = 'none';

            // Append new text segment
            if (text) {
                transcriptText.innerHTML += `<span class="word">${text} </span>`;

                // Auto-scroll to bottom
                const content = document.getElementById('transcriptContent');
                content.scrollTop = content.scrollHeight;
            }
        }

        // Initialize WebSocket connection
        function connectWebSocket(sessionId) {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/stt`;

            websocket = new WebSocket(wsUrl);
            wsReady = false;

            websocket.onopen = () => {
                console.log('[WS] Connected to server');
            };

            websocket.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);

                    switch (message.type) {
                        case 'status':
                            if (message.status === 'waiting_for_init') {
                                // Send init payload before anything else
                                const initPayload = {
                                    language: 'en',
                                    session_id: sessionId,
                                };
                                websocket.send(JSON.stringify(initPayload));
                                console.log('[WS] Init sent:', initPayload);
                                updateStatus('connecting', 'Connecting to AI...');
                            } else if (message.status === 'connecting') {
                                updateStatus('connecting', 'Connecting to AI...');
                            } else if (message.status === 'connected') {
                                wsReady = true;
                                updateStatus('connected', 'Listening...');
                            }
                            break;

                        case 'transcript':
                            updateTranscript(message.text);
                            break;

                        case 'error':
                            showError(message.error);
                            stopRecording();
                            break;
                    }
                } catch (err) {
                    console.error('[WS] Error parsing message:', err);
                }
            };

            websocket.onerror = (error) => {
                console.error('[WS] WebSocket error:', error);
                showError('Connection error. Please try again.');
                stopRecording();
            };

            websocket.onclose = () => {
                console.log('[WS] Connection closed');
                wsReady = false;
                if (isRecording) {
                    updateStatus('', 'Connection lost');
                }
            };
        }

        // Start recording
        async function startRecording() {
            try {
                hideError();
                updateStatus('connecting', 'Requesting microphone access...');

                // Get microphone access
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 24000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                // Create audio context
                audioContext = new AudioContext({ sampleRate: 24000 });

                // Generate a dev session ID (replace with a real one when integrating)
                const sessionId = 'dev-' + Date.now();

                // Connect WebSocket (init payload is sent automatically on waiting_for_init)
                connectWebSocket(sessionId);

                // Wait for WebSocket to open
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Connection timeout')), 10000);
                    websocket.addEventListener('open', () => {
                        clearTimeout(timeout);
                        resolve();
                    }, { once: true });
                    websocket.addEventListener('error', () => {
                        clearTimeout(timeout);
                        reject(new Error('Connection failed'));
                    }, { once: true });
                });

                // Load AudioWorklet processor
                await audioContext.audioWorklet.addModule(URL.createObjectURL(new Blob([`
                    class PCMProcessor extends AudioWorkletProcessor {
                        constructor() {
                            super();
                            this.bufferSize = 4800; // 200ms at 24kHz
                            this.buffer = new Float32Array(this.bufferSize);
                            this.bufferIndex = 0;
                        }
                        
                        process(inputs) {
                            const input = inputs[0];
                            if (!input || !input[0]) return true;
                            
                            const samples = input[0];
                            
                            for (let i = 0; i < samples.length; i++) {
                                this.buffer[this.bufferIndex++] = samples[i];
                                
                                if (this.bufferIndex >= this.bufferSize) {
                                    // Convert Float32 to Int16
                                    const int16 = new Int16Array(this.bufferSize);
                                    for (let j = 0; j < this.bufferSize; j++) {
                                        const s = Math.max(-1, Math.min(1, this.buffer[j]));
                                        int16[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                                    }
                                    
                                    this.port.postMessage(int16.buffer, [int16.buffer]);
                                    this.buffer = new Float32Array(this.bufferSize);
                                    this.bufferIndex = 0;
                                }
                            }
                            
                            return true;
                        }
                    }
                    
                    registerProcessor('pcm-processor', PCMProcessor);
                `], { type: 'application/javascript' })));

                // Create audio processing pipeline
                const source = audioContext.createMediaStreamSource(mediaStream);
                audioWorklet = new AudioWorkletNode(audioContext, 'pcm-processor');

                audioWorklet.port.onmessage = (event) => {
                    // Only send audio once the server has confirmed ready (after init handshake)
                    if (wsReady && websocket && websocket.readyState === WebSocket.OPEN) {
                        websocket.send(event.data);
                    }
                };

                source.connect(audioWorklet);
                audioWorklet.connect(audioContext.destination);

                // Update UI
                isRecording = true;
                micButton.classList.add('recording');
                micHint.textContent = 'Click to stop recording';
                visualizer.classList.add('active');

            } catch (error) {
                console.error('Error starting recording:', error);
                showError(error.message || 'Failed to start recording');
                stopRecording();
            }
        }

        // Stop recording
        function stopRecording() {
            isRecording = false;
            micButton.classList.remove('recording');
            micHint.textContent = 'Click to start recording';
            visualizer.classList.remove('active');
            updateStatus('', 'Click microphone to start');

            // Clean up audio
            if (audioWorklet) {
                audioWorklet.disconnect();
                audioWorklet = null;
            }

            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            // Close WebSocket
            if (websocket) {
                websocket.close();
                websocket = null;
            }
        }

        // Event Listeners
        micButton.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        clearBtn.addEventListener('click', () => {
            transcriptText.innerHTML = '';
            placeholder.style.display = 'block';
            fullTranscript = '';
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            stopRecording();
        });
    </script>
</body>

</html>
